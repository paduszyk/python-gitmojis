name: Publish package

on:
  workflow_dispatch:

jobs:
  get-release-tag:
    name: Get the package version
    runs-on: ubuntu-latest
    outputs:
      package-version: ${{ steps.package-version.outputs.package-version }}
    steps:
      - name: Check out 🎉
        uses: actions/checkout@v7.0.1
      - name: Set up uv 🐍
        uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true
      - name: Get the package version 🔖
        id: package-version
        run: echo "package-version=$(uv run --no-sync python ./scripts/package_version.py)" >> "$GITHUB_OUTPUT"
  pypi-publish:
    needs: get-release-tag
    name: Upload to PyPI
    runs-on: ubuntu-latest
    environment:
      name: PyPI
      url: https://pypi.org/p/python-gitmojis
    permissions:
      id-token: write
    steps:
      - name: Check out 🎉
        uses: actions/checkout@v7.0.1
      - name: Set up uv 🐍
        uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true
      - name: Build the package 👷
        run: uv build
      - name: Publish to PyPI 🚀
        uses: pypa/gh-action-pypi-publish@v1.14.1
  create-release-tag:
    needs:
      - get-release-tag
      - pypi-publish
    name: Create the release tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out 🎉
        uses: actions/checkout@v7.0.1
      - name: Create tag 🔖
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git tag "${{ needs.get-release-tag.outputs.package-version }}"
          git push --tags
  publish-release:
    needs:
      - get-release-tag
      - create-release-tag
    name: Publish GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out 🎉
        uses: actions/checkout@v7.0.1
      - name: Publish GitHub Release 📝
        uses: softprops/action-gh-release@v3.0.2
        with:
          tag_name: ${{ needs.get-release-tag.outputs.package-version }}
          generate_release_notes: true
